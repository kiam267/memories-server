name: Deploy to Lambda

on:
  push:
    branches: [ master ]  # Specify your branch here if needed

jobs:
  deploy_zip:
    name: Deploy Lambda Function
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v3

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'  # Specify your Node.js version here

      - name: Install Dependencies
        run: npm install  # Adjust this if you are using Yarn or another package manager

      - name: Create Zip File for Deployment
        run: zip -r deployment.zip .  # This zips the entire project folder

      - name: Deploy to AWS Lambda
        uses: appleboy/lambda-action@v0.2.0
        with:
          aws_access_key_id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_access_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws_region: ${{ secrets.AWS_REGION }}
          function_name: memories
          zip_file: deployment.zip  # Specify the zip file created
          runtime: nodejs20.x  # Update to the appropriate runtime version
